name: Sync main to Vercel repo

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push main to Vercel repository
        env:
          MIRROR_REPO_TOKEN: ${{ secrets.MIRROR_REPO_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git remote add vercel-repo https://x-access-token:${MIRROR_REPO_TOKEN}@github.com/Suho0314/sejong_application.git
          git push --force-with-lease vercel-repo HEAD:main
